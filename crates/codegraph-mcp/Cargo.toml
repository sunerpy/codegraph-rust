[package]
name = "codegraph-mcp"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true
description = "MCP stdio JSON-RPC server and tool handlers for CodeGraph-rs."
readme = "../../README.md"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
codegraph-core = { path = "../codegraph-core" }
codegraph-store = { path = "../codegraph-store" }
codegraph-graph = { path = "../codegraph-graph" }
codegraph-resolve = { path = "../codegraph-resolve" }
regex = "1.10"
rmcp = { version = "2.1", features = [
    "server",
    "transport-io",
    "transport-streamable-http-server",
], optional = true }
tokio = { version = "1", features = [
    "rt-multi-thread",
    "macros",
    "io-util",
    "net",
    "sync",
], optional = true }

[features]
# Default build MUST stay rmcp-free (no rmcp/tokio in the tree) — dual-path gate.
rmcp = ["dep:rmcp", "dep:tokio"]

[dev-dependencies]
codegraph-extract = { path = "../codegraph-extract" }
# rmcp `client` feature: dev-only, drives the handler over duplex in parity tests.
rmcp = { version = "2.1", features = ["client", "transport-io"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-util", "sync", "time"] }
