version: 0.2

# codegraph-rust — Windows MSVC CI verification (fmt + clippy + test + guardrail).
# This is the target the local Linux box CANNOT build (no lib.exe linker), so
# CodeBuild is the real pre-push Windows gate. Contains NO account-specific data.
#
# Windows gotchas (see aws-cicd-pipeline skill + .omo/notepads learnings):
#  - The aws/codebuild/windows-base:2022 image ships a PREINSTALLED Rust that is
#    too old for the codegraph workspace (edition2024 needs cargo >= 1.85). That
#    preinstalled Rust is a CHOCOLATEY SHIM at C:\ProgramData\chocolatey\bin
#    (rustc.exe / cargo.exe / rustup.exe). Deleting the .cargo/.rustup USER dirs
#    does NOT remove these shims, and filtering PATH on '\.cargo'/'\.rustup' does
#    NOT drop C:\ProgramData\chocolatey\bin — so the chocolatey rustc/cargo keep
#    winning. We therefore (a) DELETE the chocolatey rust shim exes and (b) filter
#    any 'chocolatey' PATH segment out, in addition to evicting the user dirs.
#  - CodeBuild runs EACH buildspec command line in a SEPARATE shell, so $env:PATH
#    set on one line does NOT persist to the next. Every cargo/rustc/rustup line
#    must therefore APPLY the filtered PATH in its OWN shell (we chain the
#    PATH-set with the cargo/rustc/rustup invocation via ';' on a single line).
#  - rustup-init must run via Start-Process -Wait -PassThru (direct & returns nonzero)
#  - We log Get-Command sources before/after cleanup so the next run's log is
#    conclusive, and fail-fast if cargo/rustc < 1.85.
#  - MSVC LINKER (the link.exe gotcha): once the toolchain is correct, cargo
#    COMPILE steps (clippy/test) still fail with
#       error: linking with `link.exe` failed ... link: extra operand ...
#       Try 'link --help'
#    That "link: extra operand / Try 'link --help'" is the signature of GNU
#    coreutils `link` (a hardlink utility shipped under Git-for-Windows usr\bin /
#    mingw) being invoked INSTEAD of MSVC's real link.exe. Two causes: (1) the
#    MSVC build-tools developer environment (vcvars) was never activated, so
#    MSVC link.exe/cl.exe + INCLUDE/LIB are not on PATH; and (2) the aggressive
#    cargo PATH rebuild reorders PATH so a Unix `link` precedes any MSVC linker.
#    FIX: before each cargo COMPILE step we (a) locate VS via vswhere (no
#    hardcoded path) and Enter-VsDevShell to put MSVC link.exe/cl.exe + LIB on
#    PATH, then (b) RE-PREPEND C:\cargo\bin and DROP any Git usr\bin / mingw
#    segment so cargo/rustc resolve fresh AND the MSVC link.exe wins over GNU
#    link. Because CodeBuild uses a fresh shell PER LINE, this vcvars+PATH
#    activation is inlined on the SAME line as every cargo compile invocation.
#    A `Get-Command link.exe` diagnostic logs the resolved linker (expected:
#    ...\VC\Tools\MSVC\...\bin\Hostx64\x64\link.exe).

env:
  variables:
    CARGO_TERM_COLOR: "always"
    RUST_BACKTRACE: "1"
    RUSTUP_HOME: "C:\\rustup"
    CARGO_HOME: "C:\\cargo"

phases:
  install:
    commands:
      # 1. Diagnose: log WHERE the preinstalled rustc/cargo live so the next
      #    CodeBuild run's log is conclusive about any stray toolchain (expected:
      #    C:\ProgramData\chocolatey\bin\rustc.exe / cargo.exe).
      - 'Write-Host "=== preinstalled rust (before cleanup) ==="; Get-Command rustc,cargo -ErrorAction SilentlyContinue | Select-Object Name,Source | Format-Table -AutoSize | Out-String | Write-Host; $true'
      # 2a. Delete the CHOCOLATEY Rust shim binaries. These are the real shadowing
      #     source (C:\ProgramData\chocolatey\bin) and are NOT matched by the
      #     .cargo/.rustup dir eviction nor by the .cargo/.rustup PATH filter.
      #     Defensive Remove-Item; -ErrorAction SilentlyContinue tolerates absence.
      - 'Remove-Item -Force "C:\ProgramData\chocolatey\bin\rustc.exe","C:\ProgramData\chocolatey\bin\cargo.exe","C:\ProgramData\chocolatey\bin\rustup.exe","C:\ProgramData\chocolatey\bin\rustfmt.exe","C:\ProgramData\chocolatey\bin\cargo-clippy.exe","C:\ProgramData\chocolatey\bin\clippy-driver.exe" -ErrorAction SilentlyContinue; $true'
      # 2b. Evict the preinstalled Rust USER dirs (harmless belt-and-suspenders so
      #     rustup-init does not warn "cannot install while Rust is installed").
      - 'Remove-Item -Recurse -Force "C:\Users\ContainerAdministrator\.cargo","C:\Users\ContainerAdministrator\.rustup","C:\Users\ContainerUser\.cargo","C:\Users\ContainerUser\.rustup","C:\tools\rust","C:\tools\.cargo","C:\tools\.rustup" -ErrorAction SilentlyContinue; $true'
      # 3. Download + run rustup-init into the custom CARGO_HOME/RUSTUP_HOME.
      - '[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; Invoke-WebRequest -Uri "https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe" -OutFile "C:\rustup-init.exe"'
      - '$p = Start-Process -FilePath "C:\rustup-init.exe" -ArgumentList "-y","--default-toolchain","stable","--profile","minimal","--no-modify-path" -Wait -NoNewWindow -PassThru; Write-Host "rustup exit: $($p.ExitCode)"; if ($p.ExitCode -ne 0) { exit $p.ExitCode }'
      # 4. Diagnose AFTER cleanup: must now resolve to C:\cargo\bin (NOT chocolatey).
      #    The PATH filter drops any segment referencing .cargo / .rustup / chocolatey
      #    and prepends C:\cargo\bin. Applied IN THIS shell (fresh-shell-per-line).
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); Write-Host '=== rust on PATH (after cleanup) ==='; Get-Command rustc,cargo -ErrorAction SilentlyContinue | Select-Object Name,Source | Format-Table -AutoSize | Out-String | Write-Host; $true"
      # 4b. Diagnose the MSVC developer environment: locate VS via vswhere, activate
      #     it with Enter-VsDevShell, then log which link.exe/cl.exe resolve. After
      #     DevShell the MSVC linker dir is on PATH; we filter Git usr\bin / mingw so
      #     the GNU `link` cannot shadow it (expected link.exe source:
      #     ...\VC\Tools\MSVC\...\bin\Hostx64\x64\link.exe; cl.exe alongside it).
      - "$vsPath = & \"${env:ProgramFiles(x86)}\\Microsoft Visual Studio\\Installer\\vswhere.exe\" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath; Write-Host \"VS install: $vsPath\"; Import-Module (Join-Path $vsPath 'Common7\\Tools\\Microsoft.VisualStudio.DevShell.dll'); Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments '-arch=x64 -host_arch=x64'; $env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' -and $_ -notmatch 'Git\\\\usr\\\\bin' -and $_ -notmatch 'Git\\\\mingw' -and $_ -notmatch 'mingw64' }) -join ';'); Write-Host '=== link.exe / cl.exe (after vcvars) ==='; Get-Command link.exe,cl.exe -ErrorAction SilentlyContinue | Select-Object Name,Source | Format-Table -AutoSize | Out-String | Write-Host; $true"
      # 5. Add components — MUST set the filtered PATH IN THE SAME shell so this
      #    invokes C:\cargo\bin\rustup, not the (now-deleted) chocolatey rustup.
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); rustup component add rustfmt clippy"
      # 6. Fail-fast: assert BOTH cargo and rustc are the fresh toolchain (>= 1.85),
      #    each with the filtered PATH set IN ITS OWN shell. Regex accepts 1.85-1.99,
      #    1.<100+> (e.g. 1.96), and any major >= 2.
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); $v = (cargo --version | Out-String).Trim(); Write-Host \"cargo: $v\"; if ($v -notmatch '1\\.(8[5-9]|9[0-9]|[1-9][0-9][0-9])\\.' -and $v -notmatch '[2-9]\\.[0-9]+\\.') { Write-Host \"WRONG cargo (need >= 1.85): $v\"; exit 1 }"
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); $v = (rustc --version | Out-String).Trim(); Write-Host \"rustc: $v\"; if ($v -notmatch '1\\.(8[5-9]|9[0-9]|[1-9][0-9][0-9])\\.' -and $v -notmatch '[2-9]\\.[0-9]+\\.') { Write-Host \"WRONG rustc (need >= 1.85): $v\"; exit 1 }"
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); cargo clippy --version"
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); cargo fmt --version"
  pre_build:
    commands:
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); Get-Command rustc,cargo -ErrorAction SilentlyContinue | Select-Object Name,Source | Format-Table -AutoSize | Out-String | Write-Host; $true"
  build:
    commands:
      # fmt needs NO linker (no compile), so the plain filtered PATH suffices.
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); Write-Host '=== fmt check ==='; cargo fmt --all --check"
      # clippy COMPILES (build scripts + crates) → needs the MSVC linker. Activate
      # vcvars via vswhere + Enter-VsDevShell on THIS line (fresh-shell-per-line),
      # then RE-PREPEND C:\cargo\bin and DROP Git usr\bin / mingw so cargo/rustc are
      # fresh AND MSVC link.exe wins over the GNU `link`. Log the resolved link.exe.
      - "$vsPath = & \"${env:ProgramFiles(x86)}\\Microsoft Visual Studio\\Installer\\vswhere.exe\" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath; Import-Module (Join-Path $vsPath 'Common7\\Tools\\Microsoft.VisualStudio.DevShell.dll'); Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments '-arch=x64 -host_arch=x64'; $env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' -and $_ -notmatch 'Git\\\\usr\\\\bin' -and $_ -notmatch 'Git\\\\mingw' -and $_ -notmatch 'mingw64' }) -join ';'); Write-Host '=== clippy link.exe ==='; Get-Command link.exe -ErrorAction SilentlyContinue | Select-Object Source | Out-String | Write-Host; Write-Host '=== clippy (-D warnings) ==='; cargo clippy --workspace --all-targets -- -D warnings"
      # test COMPILES test harnesses + crates → same vcvars activation required.
      - "$vsPath = & \"${env:ProgramFiles(x86)}\\Microsoft Visual Studio\\Installer\\vswhere.exe\" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath; Import-Module (Join-Path $vsPath 'Common7\\Tools\\Microsoft.VisualStudio.DevShell.dll'); Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments '-arch=x64 -host_arch=x64'; $env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' -and $_ -notmatch 'Git\\\\usr\\\\bin' -and $_ -notmatch 'Git\\\\mingw' -and $_ -notmatch 'mingw64' }) -join ';'); Write-Host '=== test link.exe ==='; Get-Command link.exe -ErrorAction SilentlyContinue | Select-Object Source | Out-String | Write-Host; Write-Host '=== test (workspace) ==='; cargo test --workspace"
  post_build:
    commands:
      - Write-Host "Windows CI verification complete."
