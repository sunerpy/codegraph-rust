version: 0.2

# codegraph-rust — Windows MSVC CI verification (fmt + clippy + test + guardrail).
# This is the target the local Linux box CANNOT build (no lib.exe linker), so
# CodeBuild is the real pre-push Windows gate. Contains NO account-specific data.
#
# Windows gotchas (see aws-cicd-pipeline skill + .omo/notepads learnings):
#  - The aws/codebuild/windows-base:2022 image ships a PREINSTALLED Rust that is
#    too old for the codegraph workspace (edition2024 needs cargo >= 1.85). That
#    preinstalled Rust is a CHOCOLATEY SHIM at C:\ProgramData\chocolatey\bin
#    (rustc.exe / cargo.exe / rustup.exe). Deleting the .cargo/.rustup USER dirs
#    does NOT remove these shims, and filtering PATH on '\.cargo'/'\.rustup' does
#    NOT drop C:\ProgramData\chocolatey\bin — so the chocolatey rustc/cargo keep
#    winning. We therefore (a) DELETE the chocolatey rust shim exes and (b) filter
#    any 'chocolatey' PATH segment out, in addition to evicting the user dirs.
#  - CodeBuild runs EACH buildspec command line in a SEPARATE shell, so $env:PATH
#    set on one line does NOT persist to the next. Every cargo/rustc/rustup line
#    must therefore APPLY the filtered PATH in its OWN shell (we chain the
#    PATH-set with the cargo/rustc/rustup invocation via ';' on a single line).
#  - rustup-init must run via Start-Process -Wait -PassThru (direct & returns nonzero)
#  - We log Get-Command sources before/after cleanup so the next run's log is
#    conclusive, and fail-fast if cargo/rustc < 1.85.
#  - MSVC BUILD TOOLS ARE *ABSENT* on the image (definitive root cause). The
#    aws/codebuild/windows-base:2022-1.0 image does NOT ship Visual Studio or the
#    VC++ Build Tools: `vswhere` returns an EMPTY install path, so
#    Enter-VsDevShell never activates and the ONLY `link.exe` on PATH is
#    C:\tools\msys64\usr\bin\link.exe (GNU coreutils `link`), which chokes on
#    MSVC linker args with:
#       error: linking with `link.exe` failed ...
#       link: extra operand ...  Try 'link --help'
#    rustc DID install the correct stable-x86_64-pc-windows-msvc host toolchain
#    and emits MSVC-style link args (/NOLOGO /OUT:...), but there is no MSVC
#    link.exe present to execute them. `cargo fmt --check` passes (no linker),
#    only the compile/clippy/test steps fail at link.
#    FIX (the only viable approach on this image):
#      (1) In the install phase, DOWNLOAD + run the VS Build Tools bootstrapper
#          (https://aka.ms/vs/17/release/vs_buildtools.exe) ONCE, installing the
#          VCTools workload + Win11 SDK to a KNOWN path C:\BuildTools (slow,
#          multi-GB, several minutes — unavoidable). Installer exit code 3010
#          means "success, reboot suggested" — we treat BOTH 0 and 3010 as
#          success.
#      (2) Before each cargo COMPILE step (clippy, test) — on the SAME line,
#          since CodeBuild uses a fresh shell PER LINE — Import the DevShell
#          module from C:\BuildTools and Enter-VsDevShell -VsInstallPath
#          C:\BuildTools to put MSVC link.exe/cl.exe + INCLUDE/LIB on PATH; THEN
#          re-prepend C:\cargo\bin (so cargo/rustc resolve fresh) and DROP the
#          unix bin segments. CRITICAL: add 'msys64' to the PATH notmatch filter
#          (the GNU link lives at C:\tools\msys64\usr\bin) so it cannot shadow
#          the MSVC link.exe. A `Get-Command link.exe,cl.exe` diagnostic logs the
#          resolved linker (expected:
#          C:\BuildTools\VC\Tools\MSVC\...\bin\Hostx64\x64\link.exe).
#    We deliberately point Enter-VsDevShell at the KNOWN C:\BuildTools path
#    (NOT vswhere) because vswhere returned empty on this image — that is the
#    whole reason we install to a fixed, predictable location.

env:
  variables:
    CARGO_TERM_COLOR: "always"
    RUST_BACKTRACE: "1"
    RUSTUP_HOME: "C:\\rustup"
    CARGO_HOME: "C:\\cargo"

phases:
  install:
    commands:
      # 1. Diagnose: log WHERE the preinstalled rustc/cargo live so the next
      #    CodeBuild run's log is conclusive about any stray toolchain (expected:
      #    C:\ProgramData\chocolatey\bin\rustc.exe / cargo.exe).
      - 'Write-Host "=== preinstalled rust (before cleanup) ==="; Get-Command rustc,cargo -ErrorAction SilentlyContinue | Select-Object Name,Source | Format-Table -AutoSize | Out-String | Write-Host; $true'
      # 2a. Delete the CHOCOLATEY Rust shim binaries. These are the real shadowing
      #     source (C:\ProgramData\chocolatey\bin) and are NOT matched by the
      #     .cargo/.rustup dir eviction nor by the .cargo/.rustup PATH filter.
      #     Defensive Remove-Item; -ErrorAction SilentlyContinue tolerates absence.
      - 'Remove-Item -Force "C:\ProgramData\chocolatey\bin\rustc.exe","C:\ProgramData\chocolatey\bin\cargo.exe","C:\ProgramData\chocolatey\bin\rustup.exe","C:\ProgramData\chocolatey\bin\rustfmt.exe","C:\ProgramData\chocolatey\bin\cargo-clippy.exe","C:\ProgramData\chocolatey\bin\clippy-driver.exe" -ErrorAction SilentlyContinue; $true'
      # 2b. Evict the preinstalled Rust USER dirs (harmless belt-and-suspenders so
      #     rustup-init does not warn "cannot install while Rust is installed").
      - 'Remove-Item -Recurse -Force "C:\Users\ContainerAdministrator\.cargo","C:\Users\ContainerAdministrator\.rustup","C:\Users\ContainerUser\.cargo","C:\Users\ContainerUser\.rustup","C:\tools\rust","C:\tools\.cargo","C:\tools\.rustup" -ErrorAction SilentlyContinue; $true'
      # 3. Download + run rustup-init into the custom CARGO_HOME/RUSTUP_HOME.
      - '[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; Invoke-WebRequest -Uri "https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe" -OutFile "C:\rustup-init.exe"'
      - '$p = Start-Process -FilePath "C:\rustup-init.exe" -ArgumentList "-y","--default-toolchain","stable","--profile","minimal","--no-modify-path" -Wait -NoNewWindow -PassThru; Write-Host "rustup exit: $($p.ExitCode)"; if ($p.ExitCode -ne 0) { exit $p.ExitCode }'
      # 3b. INSTALL VS BUILD TOOLS to C:\BuildTools (the MSVC linker is ABSENT on
      #     this image — see header). Download the bootstrapper over TLS 1.2 and
      #     run it --quiet --wait, adding the VCTools workload + the standalone
      #     x86/x64 VC.Tools component + the Windows 11 SDK (22621) +
      #     --includeRecommended. This is SLOW (multi-GB, several minutes) but is
      #     the ONLY way to get an MSVC link.exe on this image. Exit code 3010 ==
      #     "success but reboot suggested" — we treat BOTH 0 and 3010 as success.
      - '[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_buildtools.exe" -OutFile "C:\vs_buildtools.exe"'
      - '$p = Start-Process -FilePath "C:\vs_buildtools.exe" -ArgumentList "--quiet","--wait","--norestart","--nocache","--installPath","C:\BuildTools","--add","Microsoft.VisualStudio.Workload.VCTools","--add","Microsoft.VisualStudio.Component.VC.Tools.x86.x64","--add","Microsoft.VisualStudio.Component.Windows11SDK.22621","--includeRecommended" -Wait -PassThru -NoNewWindow; Write-Host "buildtools installer exit: $($p.ExitCode)"; if ($p.ExitCode -ne 0 -and $p.ExitCode -ne 3010) { Write-Host "BuildTools install FAILED: $($p.ExitCode)"; exit $p.ExitCode }'
      # 3c. Verify the install: log the MSVC DevShell module + the link.exe/cl.exe
      #     that Enter-VsDevShell exposes from C:\BuildTools. Expected link.exe
      #     source: C:\BuildTools\VC\Tools\MSVC\...\bin\Hostx64\x64\link.exe (cl.exe
      #     alongside). We point Enter-VsDevShell at the KNOWN C:\BuildTools path
      #     (vswhere returns empty on this image, hence the fixed install path).
      - "Write-Host '=== BuildTools install layout ==='; Get-ChildItem 'C:\\BuildTools\\Common7\\Tools\\Microsoft.VisualStudio.DevShell.dll' -ErrorAction SilentlyContinue | Select-Object FullName | Out-String | Write-Host; Get-ChildItem 'C:\\BuildTools\\VC\\Tools\\MSVC\\*\\bin\\Hostx64\\x64\\link.exe' -ErrorAction SilentlyContinue | Select-Object FullName | Out-String | Write-Host; Import-Module 'C:\\BuildTools\\Common7\\Tools\\Microsoft.VisualStudio.DevShell.dll'; Enter-VsDevShell -VsInstallPath 'C:\\BuildTools' -SkipAutomaticLocation -DevCmdArguments '-arch=x64 -host_arch=x64'; $env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' -and $_ -notmatch 'msys64' -and $_ -notmatch 'Git\\\\usr\\\\bin' -and $_ -notmatch 'Git\\\\mingw' -and $_ -notmatch 'mingw64' }) -join ';'); Write-Host '=== link.exe / cl.exe (after Enter-VsDevShell C:\\BuildTools) ==='; Get-Command link.exe,cl.exe -ErrorAction SilentlyContinue | Select-Object Name,Source | Format-Table -AutoSize | Out-String | Write-Host; $true"
      # 4. Diagnose AFTER cleanup: must now resolve to C:\cargo\bin (NOT chocolatey).
      #    The PATH filter drops any segment referencing .cargo / .rustup / chocolatey
      #    and prepends C:\cargo\bin. Applied IN THIS shell (fresh-shell-per-line).
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); Write-Host '=== rust on PATH (after cleanup) ==='; Get-Command rustc,cargo -ErrorAction SilentlyContinue | Select-Object Name,Source | Format-Table -AutoSize | Out-String | Write-Host; $true"
      # 5. Add components — MUST set the filtered PATH IN THE SAME shell so this
      #    invokes C:\cargo\bin\rustup, not the (now-deleted) chocolatey rustup.
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); rustup component add rustfmt clippy"
      # 6. Fail-fast: assert BOTH cargo and rustc are the fresh toolchain (>= 1.85),
      #    each with the filtered PATH set IN ITS OWN shell. Regex accepts 1.85-1.99,
      #    1.<100+> (e.g. 1.96), and any major >= 2.
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); $v = (cargo --version | Out-String).Trim(); Write-Host \"cargo: $v\"; if ($v -notmatch '1\\.(8[5-9]|9[0-9]|[1-9][0-9][0-9])\\.' -and $v -notmatch '[2-9]\\.[0-9]+\\.') { Write-Host \"WRONG cargo (need >= 1.85): $v\"; exit 1 }"
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); $v = (rustc --version | Out-String).Trim(); Write-Host \"rustc: $v\"; if ($v -notmatch '1\\.(8[5-9]|9[0-9]|[1-9][0-9][0-9])\\.' -and $v -notmatch '[2-9]\\.[0-9]+\\.') { Write-Host \"WRONG rustc (need >= 1.85): $v\"; exit 1 }"
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); cargo clippy --version"
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); cargo fmt --version"
  pre_build:
    commands:
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); Get-Command rustc,cargo -ErrorAction SilentlyContinue | Select-Object Name,Source | Format-Table -AutoSize | Out-String | Write-Host; $true"
  build:
    commands:
      # fmt needs NO linker (no compile), so the plain filtered PATH suffices.
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' }) -join ';'); Write-Host '=== fmt check ==='; cargo fmt --all --check"
      # clippy COMPILES (build scripts + crates) → needs the MSVC linker. Activate
      # the C:\BuildTools MSVC env via Enter-VsDevShell on THIS line (fresh-shell-
      # per-line), then RE-PREPEND C:\cargo\bin and DROP msys64 / Git usr\bin /
      # mingw so cargo/rustc are fresh AND the MSVC link.exe wins over the GNU
      # `link` at C:\tools\msys64\usr\bin. Log the resolved link.exe.
      - "Import-Module 'C:\\BuildTools\\Common7\\Tools\\Microsoft.VisualStudio.DevShell.dll'; Enter-VsDevShell -VsInstallPath 'C:\\BuildTools' -SkipAutomaticLocation -DevCmdArguments '-arch=x64 -host_arch=x64'; $env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' -and $_ -notmatch 'msys64' -and $_ -notmatch 'Git\\\\usr\\\\bin' -and $_ -notmatch 'Git\\\\mingw' -and $_ -notmatch 'mingw64' }) -join ';'); Write-Host '=== clippy link.exe ==='; Get-Command link.exe -ErrorAction SilentlyContinue | Select-Object Source | Out-String | Write-Host; Write-Host '=== clippy (-D warnings) ==='; cargo clippy --workspace --all-targets -- -D warnings"
      # test COMPILES test harnesses + crates → same C:\BuildTools MSVC activation.
      - "Import-Module 'C:\\BuildTools\\Common7\\Tools\\Microsoft.VisualStudio.DevShell.dll'; Enter-VsDevShell -VsInstallPath 'C:\\BuildTools' -SkipAutomaticLocation -DevCmdArguments '-arch=x64 -host_arch=x64'; $env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' -and $_ -notmatch 'chocolatey' -and $_ -notmatch 'msys64' -and $_ -notmatch 'Git\\\\usr\\\\bin' -and $_ -notmatch 'Git\\\\mingw' -and $_ -notmatch 'mingw64' }) -join ';'); Write-Host '=== test link.exe ==='; Get-Command link.exe -ErrorAction SilentlyContinue | Select-Object Source | Out-String | Write-Host; Write-Host '=== test (workspace) ==='; cargo test --workspace"
  post_build:
    commands:
      - Write-Host "Windows CI verification complete."
