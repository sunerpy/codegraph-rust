version: 0.2

# codegraph-rust — Windows MSVC CI verification (fmt + clippy + test + guardrail).
# This is the target the local Linux box CANNOT build (no lib.exe linker), so
# CodeBuild is the real pre-push Windows gate. Contains NO account-specific data.
#
# Windows gotchas (see aws-cicd-pipeline skill):
#  - The aws/codebuild/windows-base:2022 image ships a PREINSTALLED Rust (1.84.1)
#    that is too old for the codegraph workspace (edition2024 needs cargo >= 1.85).
#    That preinstalled toolchain SHADOWS our custom install unless its dir is
#    removed AND its bin dir is evicted from PATH. Installing fresh stable into a
#    custom CARGO_HOME/RUSTUP_HOME is NECESSARY but NOT SUFFICIENT — we must also
#    win on PATH. We log Get-Command sources, delete the preinstalled dirs, filter
#    PATH down to only C:\cargo\bin, and fail-fast if cargo/rustc < 1.85.
#  - rustup-init must run via Start-Process -Wait -PassThru (direct & returns nonzero)
#  - $env:PATH does NOT persist between phases -> re-set every phase

env:
  variables:
    CARGO_TERM_COLOR: "always"
    RUST_BACKTRACE: "1"
    RUSTUP_HOME: "C:\\rustup"
    CARGO_HOME: "C:\\cargo"

phases:
  install:
    commands:
      # 1. Diagnose: log WHERE the preinstalled rustc/cargo live so the next
      #    CodeBuild run's log is conclusive about any stray toolchain.
      - 'Write-Host "=== preinstalled rust (before cleanup) ==="; Get-Command rustc,cargo -ErrorAction SilentlyContinue | Select-Object Name,Source | Format-Table -AutoSize | Out-String | Write-Host; $true'
      # 2. Evict the preinstalled Rust: remove every known image location so it
      #    cannot shadow the fresh install. -ErrorAction SilentlyContinue tolerates
      #    absent paths; the rustup-init "cannot install while Rust is installed"
      #    warning comes from these dirs existing.
      - 'Remove-Item -Recurse -Force "C:\Users\ContainerAdministrator\.cargo","C:\Users\ContainerAdministrator\.rustup","C:\Users\ContainerUser\.cargo","C:\Users\ContainerUser\.rustup","C:\tools\rust","C:\tools\.cargo","C:\tools\.rustup" -ErrorAction SilentlyContinue; $true'
      # 3. Download + run rustup-init into the custom CARGO_HOME/RUSTUP_HOME.
      - '[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; Invoke-WebRequest -Uri "https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe" -OutFile "C:\rustup-init.exe"'
      - '$p = Start-Process -FilePath "C:\rustup-init.exe" -ArgumentList "-y","--default-toolchain","stable","--profile","minimal","--no-modify-path" -Wait -NoNewWindow -PassThru; Write-Host "rustup exit: $($p.ExitCode)"; if ($p.ExitCode -ne 0) { exit $p.ExitCode }'
      # 4. Rebuild PATH: put C:\cargo\bin FIRST and drop any other segment that
      #    references a .cargo / .rustup dir, so nothing else can provide cargo/rustc.
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' }) -join ';')"
      - 'Write-Host "=== rust on PATH (after cleanup) ==="; Get-Command rustc,cargo -ErrorAction SilentlyContinue | Select-Object Name,Source | Format-Table -AutoSize | Out-String | Write-Host; $true'
      - rustup component add rustfmt clippy
      # 5. Fail-fast: assert BOTH cargo and rustc are the fresh toolchain (>= 1.85).
      #    Regex accepts 1.85-1.99 and 1.<100+> (e.g. 1.96), and any major >= 2.
      - "$v = (cargo --version | Out-String).Trim(); Write-Host \"cargo: $v\"; if ($v -notmatch '1\\.(8[5-9]|9[0-9]|[1-9][0-9][0-9])\\.' -and $v -notmatch '[2-9]\\.[0-9]+\\.') { Write-Host \"WRONG cargo (need >= 1.85): $v\"; exit 1 }"
      - "$v = (rustc --version | Out-String).Trim(); Write-Host \"rustc: $v\"; if ($v -notmatch '1\\.(8[5-9]|9[0-9]|[1-9][0-9][0-9])\\.' -and $v -notmatch '[2-9]\\.[0-9]+\\.') { Write-Host \"WRONG rustc (need >= 1.85): $v\"; exit 1 }"
      - cargo clippy --version
      - cargo fmt --version
  pre_build:
    commands:
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' }) -join ';')"
  build:
    commands:
      - "$env:PATH = 'C:\\cargo\\bin;' + (($env:PATH -split ';' | Where-Object { $_ -notmatch '\\.cargo' -and $_ -notmatch '\\.rustup' }) -join ';')"
      - Write-Host "=== fmt check ==="
      - cargo fmt --all --check
      - Write-Host "=== clippy (-D warnings) ==="
      - cargo clippy --workspace --all-targets -- -D warnings
      - Write-Host "=== test (workspace) ==="
      - cargo test --workspace
  post_build:
    commands:
      - Write-Host "Windows CI verification complete."
