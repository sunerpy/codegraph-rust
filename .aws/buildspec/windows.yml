version: 0.2

# codegraph-rust — Windows MSVC CI verification (fmt + clippy + test + guardrail).
# This is the target the local Linux box CANNOT build (no lib.exe linker), so
# CodeBuild is the real pre-push Windows gate. Contains NO account-specific data.
#
# Windows gotchas (see aws-cicd-pipeline skill):
#  - preinstalled Rust may be too old -> fresh stable into custom CARGO/RUSTUP home
#  - rustup-init must run via Start-Process -Wait -PassThru (direct & returns nonzero)
#  - $env:PATH does NOT persist between phases -> re-set every phase

env:
  variables:
    CARGO_TERM_COLOR: "always"
    RUST_BACKTRACE: "1"
    RUSTUP_HOME: "C:\\rustup"
    CARGO_HOME: "C:\\cargo"

phases:
  install:
    commands:
      - 'Remove-Item -Recurse -Force "C:\Users\ContainerUser\.cargo","C:\Users\ContainerUser\.rustup" -ErrorAction SilentlyContinue; $true'
      - '[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; Invoke-WebRequest -Uri "https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe" -OutFile "C:\rustup-init.exe"'
      - '$p = Start-Process -FilePath "C:\rustup-init.exe" -ArgumentList "-y","--default-toolchain","stable","--profile","minimal","--component","rustfmt","clippy","--no-modify-path" -Wait -NoNewWindow -PassThru; Write-Host "rustup exit: $($p.ExitCode)"; if ($p.ExitCode -ne 0) { exit $p.ExitCode }'
      - $env:PATH = "C:\cargo\bin;$env:PATH"
      - rustc --version
      - cargo --version
      - cargo clippy --version
      - cargo fmt --version
  pre_build:
    commands:
      - $env:PATH = "C:\cargo\bin;$env:PATH"
  build:
    commands:
      - $env:PATH = "C:\cargo\bin;$env:PATH"
      - Write-Host "=== fmt check ==="
      - cargo fmt --all --check
      - Write-Host "=== clippy (-D warnings) ==="
      - cargo clippy --workspace --all-targets -- -D warnings
      - Write-Host "=== test (workspace) ==="
      - cargo test --workspace
  post_build:
    commands:
      - Write-Host "Windows CI verification complete."
