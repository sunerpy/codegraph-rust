version: 0.2

# codegraph-rust — Linux CI verification (fmt + clippy + test + guardrail).
# Mirrors `make ci`. Contains NO account-specific data.

env:
  variables:
    CARGO_TERM_COLOR: "always"
    RUST_BACKTRACE: "1"

phases:
  install:
    commands:
      - apt-get update
      - apt-get install -y build-essential pkg-config libssl-dev
      # Fresh stable rust (standard:7.0's preinstalled toolchain may lag MSRV/edition needs)
      - rm -rf $HOME/.cargo/registry $HOME/.cargo/config.toml
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
      - export PATH="$HOME/.cargo/bin:$PATH"
      - rustup component add rustfmt clippy
      - rustc --version && cargo --version && cargo clippy --version && cargo fmt --version
  pre_build:
    commands:
      - export PATH="$HOME/.cargo/bin:$PATH"
  build:
    commands:
      - export PATH="$HOME/.cargo/bin:$PATH"
      - echo "=== fmt check ==="
      - cargo fmt --all --check
      - echo "=== clippy (-D warnings) ==="
      - cargo clippy --workspace --all-targets -- -D warnings
      - echo "=== test (workspace) ==="
      - cargo test --workspace
      - echo "=== guardrail (no AI/vector/LLM crates) ==="
      - bash scripts/guardrail.sh
  post_build:
    commands:
      - echo "Linux CI verification complete."
