name: Release

on:
  push:
    branches:
      - main
  # Manual re-trigger for re-attaching binaries to an ALREADY-released tag
  # (e.g. when the original build-binaries jobs failed).
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to (re)build binaries for (e.g. v0.1.0)"
        required: true
        type: string
      version:
        description: "Version string for artifact names (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  # verify-ci's `gh api` calls read the CI workflow's runs + jobs.
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: codegraph

jobs:
  # ----------------------------------------------------------------
  # release-please: open/maintain the release PR; on merge, cut a tag
  # and emit outputs that gate the heavy jobs below.
  #
  # The GitHub Release is created as a DRAFT (draft: true in
  # release-please-config.json) with the git tag forced into existence
  # immediately (force-tag-creation: true) so the build/upload jobs can
  # check out the tag. The release is flipped to published (draft=false)
  # only by the final publish-release job, after all builds + asset
  # uploads succeed — closing the old zero/partial-asset public window.
  # ----------------------------------------------------------------
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      build_artifacts: ${{ steps.gate.outputs.build_artifacts }}
      tag_name: ${{ steps.gate.outputs.tag_name }}
      version: ${{ steps.gate.outputs.version }}
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Run release-please
        id: release
        if: github.event_name == 'push'
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve build gate
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build_artifacts=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "build_artifacts=${{ steps.release.outputs.release_created }}" >> "$GITHUB_OUTPUT"
            echo "tag_name=${{ steps.release.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.release.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

  # ----------------------------------------------------------------
  # verify-ci: gate the release on the SAME tag commit's CI result.
  #
  # We do NOT re-run cargo tests here — we QUERY the existing `CI` workflow
  # run for the exact tag commit SHA (event=push, branch=main) and wait for
  # its `CI Success` job to conclude. Gating on that single job (which itself
  # needs test/audit/windows) is the right wait point: it excludes the slow
  # informational Coverage job.
  #
  # Topology: this runs IN PARALLEL with build-binaries (build-binaries needs
  # only release-please), so the ~430s cross-compile overlaps with the CI wait.
  # The gate is enforced downstream at upload-assets (which lists verify-ci in
  # `needs`) — the first public-facing step that touches the GitHub Release.
  # build-binaries only produces throwaway artifacts (retention-days: 1), so a
  # failed/timed-out verify-ci blocks upload-assets + publish-release and leaves
  # the Release a DRAFT, without weakening the gate.
  #
  # This job ALWAYS RUNS when a tag was cut (build_artifacts=='true'); it must
  # never be SKIPPED, because upload-assets lists it in `needs` and a skipped
  # needed job would cascade-skip upload-assets. On the workflow_dispatch
  # (manual re-attach) path there is no new CI run, so the job short-circuits
  # to success as a no-op; the polling steps run only on the push path.
  # ----------------------------------------------------------------
  verify-ci:
    name: Verify CI Passed
    needs: release-please
    if: needs.release-please.outputs.build_artifacts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Manual re-attach — skip CI gate (no-op success)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "workflow_dispatch: re-attaching binaries to an existing tag; no new CI run to gate on — passing."

      - name: Checkout tag
        if: github.event_name == 'push'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Resolve tag commit SHA
        id: sha
        if: github.event_name == 'push'
        run: echo "sha=$(git rev-list -n1 '${{ needs.release-please.outputs.tag_name }}')" >> "$GITHUB_OUTPUT"

      - name: Wait for CI Success on the tag commit
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -euo pipefail
          # Bounded poll: ~25 min cap (100 iterations x 15s) inside timeout-minutes: 30.
          max_iters=100
          sleep_secs=15
          run_id=""
          for i in $(seq 1 "$max_iters"); do
            # Select the CI workflow's push run on main for the exact tag SHA;
            # if several exist, take the most recent by created_at.
            run_id=$(gh api "repos/${REPO}/actions/runs?head_sha=${HEAD_SHA}&event=push&branch=main&per_page=100" \
              --jq '[.workflow_runs[] | select(.name == "CI")] | sort_by(.created_at) | last | .id // empty')
            if [ -n "$run_id" ]; then
              echo "Found CI run ${run_id} for ${HEAD_SHA}"
              break
            fi
            echo "No CI run for ${HEAD_SHA} yet (attempt ${i}/${max_iters}); sleeping ${sleep_secs}s..."
            sleep "$sleep_secs"
          done
          if [ -z "$run_id" ]; then
            echo "❌ Timed out waiting for a CI run on ${HEAD_SHA}; leaving release as draft."
            exit 1
          fi
          for i in $(seq 1 "$max_iters"); do
            status=$(gh api "repos/${REPO}/actions/runs/${run_id}/jobs?per_page=100" \
              --jq '.jobs[] | select(.name == "CI Success") | .status')
            conclusion=$(gh api "repos/${REPO}/actions/runs/${run_id}/jobs?per_page=100" \
              --jq '.jobs[] | select(.name == "CI Success") | .conclusion // ""')
            if [ -z "$status" ]; then
              echo "CI Success job not present in run ${run_id} yet (attempt ${i}/${max_iters}); sleeping ${sleep_secs}s..."
              sleep "$sleep_secs"
              continue
            fi
            if [ "$status" != "completed" ]; then
              echo "CI Success job status=${status} (attempt ${i}/${max_iters}); sleeping ${sleep_secs}s..."
              sleep "$sleep_secs"
              continue
            fi
            if [ "$conclusion" = "success" ]; then
              echo "✅ CI Success passed for ${HEAD_SHA}."
              exit 0
            fi
            echo "❌ CI Success concluded '${conclusion}' for ${HEAD_SHA}; blocking release (draft preserved)."
            exit 1
          done
          echo "❌ Timed out waiting for CI Success to complete on ${HEAD_SHA}; leaving release as draft."
          exit 1

  # ----------------------------------------------------------------
  # build-binaries: cross-compile release artifacts for all targets.
  # Gated on a cut tag. The CLI crate is `codegraph-rs`, binary `codegraph`.
  # ----------------------------------------------------------------
  build-binaries:
    name: Build ${{ matrix.target }}
    needs: release-please
    if: needs.release-please.outputs.build_artifacts == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_zigbuild: true
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_zigbuild: true
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            use_zigbuild: false
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            use_zigbuild: false
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_zigbuild: false
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            use_zigbuild: false
            archive: zip
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Zig
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build (zigbuild)
        if: matrix.use_zigbuild
        run: cargo zigbuild --release -p codegraph-rs --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.use_zigbuild }}
        run: cargo build --release -p codegraph-rs --target ${{ matrix.target }}

      - name: Package (unix tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          tar -czf "dist/${BINARY_NAME}-${{ needs.release-please.outputs.version }}-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" "${BINARY_NAME}"

      - name: Package (windows zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/${env:BINARY_NAME}.exe" `
            -DestinationPath "dist/${env:BINARY_NAME}-${{ needs.release-please.outputs.version }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*
          retention-days: 1

  # ----------------------------------------------------------------
  # upload-assets: gather all artifacts, render release notes with
  # git-cliff, and attach binaries to the (still-DRAFT) GitHub Release.
  # release-please created the Release as a draft (release-please-config.json
  # "draft": true), so the softprops step keeps draft:true here — it only
  # updates the draft with notes + assets, it must NOT publish.
  # ----------------------------------------------------------------
  upload-assets:
    name: Upload Release Assets
    needs: [release-please, build-binaries, verify-ci]
    if: needs.release-please.outputs.build_artifacts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          body_path: RELEASE_NOTES.md
          # Keep the release a DRAFT while attaching assets; the dedicated
          # publish-release job below flips it to published only on full success.
          draft: true
          files: |
            dist/*.tar.gz
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ----------------------------------------------------------------
  # publish-release: flip the draft Release to PUBLISHED (draft=false) and
  # mark it "latest" — but ONLY after every build-binaries matrix job AND
  # upload-assets succeeded.
  #
  # WHY (draft-until-all-green): release-please creates the Release as a DRAFT
  # (config "draft": true) and the tag immediately (config "force-tag-creation":
  # true). Without this gate the Release would be PUBLIC the instant release-please
  # ran — i.e. before any binary was built — leaving a window where a public
  # "latest" Release has zero/partial assets if a build later fails. By deferring
  # publication to this terminal job, a failed build leaves a *visible draft*
  # (observable failure) instead of a broken public release. The default `needs`
  # semantics require all listed jobs to succeed, so this job only runs on a fully
  # green build+upload; otherwise the Release stays a draft.
  # ----------------------------------------------------------------
  publish-release:
    name: Publish Release
    needs: [release-please, build-binaries, upload-assets]
    if: needs.release-please.outputs.build_artifacts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Publish the draft Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.release-please.outputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --latest
